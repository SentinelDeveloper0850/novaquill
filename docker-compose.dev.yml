services:
  postgres:
    image: postgres:16-alpine
    container_name: novaquill-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: novaquill
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - novaquill-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novaquill"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  novaquill-postgres-data:
